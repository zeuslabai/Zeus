# Zeus Web — nginx config for FreeBSD
# Install to: /usr/local/etc/nginx/zeus-web.conf
#
# Serves the Zeus web frontend from /usr/local/www/zeus
# and proxies API requests to the zeus-gateway backend.

worker_processes 1;
pid /var/run/zeus_web.pid;
error_log /var/log/zeus/nginx-error.log;

events {
    worker_connections 256;
}

http {
    include       /usr/local/etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/zeus/nginx-access.log;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream zeus_backend {
        server 127.0.0.1:3001;
    }

    server {
        listen 80;
        server_name _; # catch-all — edit to your hostname/IP if needed

        root /usr/local/www/zeus;
        index index.html;
        client_max_body_size 100m;

        # Static frontend
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API proxy
        location /v1/ {
            proxy_pass http://zeus_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # WebSocket proxy
        location /v1/ws {
            proxy_pass http://zeus_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # Health check (direct pass-through)
        location /health {
            proxy_pass http://zeus_backend;
        }
    }
}
