[package]
name = "zeus-solana"
description = "Solana on-chain operations for Zeus — SPL token transfers and settlement"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
# vendored: solana-secp256r1-program links OpenSSL; vendoring builds it from
# source per-target so release cross-compiles (zigbuild linux, x86_64 mac) work.
openssl = { version = "0.10", features = ["vendored"] }
zeus-core.workspace = true
zeus-wallet.workspace = true
zeus-agora.workspace = true

solana-client = "2"
solana-sdk = "2"
spl-token-2022 = "7"
spl-associated-token-account = "6"

bs58.workspace = true
thiserror.workspace = true
tracing.workspace = true
tokio = { workspace = true, features = ["rt"] }
