[package]
name = "zeus-talos"
description = "Native macOS/cross-platform automation tools for Zeus"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
zeus-core.workspace = true

# Async runtime
tokio.workspace = true
async-trait.workspace = true

# Serialization
serde.workspace = true
