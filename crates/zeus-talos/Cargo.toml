# Database
rusqlite = { workspace = true }

# IDs
uuid = { workspace = true }

# Scheduling
cron = { workspace = true }

# Encoding
base64.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
tempfile.workspace = true
